<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />

    <link rel="icon" href="/newwwl.jpg" />

    <title>GrantChina — обучение в Китае</title>
    <meta name="description" content="GrantChina — образовательное агентство: бакалавриат, магистратура и языковые курсы в Китае." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- ==================== АНАЛИТИКА ==================== -->
    <!--
      Чтобы включить Google Analytics и Yandex.Metrica:
      1. Получить Measurement ID в https://analytics.google.com  (формат G-XXXXXXXXXX)
      2. Получить Counter ID в https://metrika.yandex.ru  (число)
      3. Вписать эти значения ниже в переменные GA_ID и YM_ID вместо null.
      Пока они null — скрипты не инициализируются и не ломают сайт.
    -->
    <script>
      // ⬇ Замените null на ваши идентификаторы
      window.__GA_ID__ = null;  // 'G-XXXXXXXXXX'
      window.__YM_ID__ = null;  // 12345678
    </script>

    <!-- Google Analytics 4 -->
    <script>
      (function () {
        var id = window.__GA_ID__;
        if (!id) return;
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.googletagmanager.com/gtag/js?id=' + id;
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        window.gtag = function () { dataLayer.push(arguments); };
        gtag('js', new Date());
        gtag('config', id);
      })();
    </script>

    <!-- Yandex.Metrica -->
    <script>
      (function (m, e, t, r, i, k, a) {
        if (!window.__YM_ID__) return;
        m[i] = m[i] || function () { (m[i].a = m[i].a || []).push(arguments); };
        m[i].l = 1 * new Date();
        for (var j = 0; j < document.scripts.length; j++) {
          if (document.scripts[j].src === r) return;
        }
        k = e.createElement(t); a = e.getElementsByTagName(t)[0];
        k.async = 1; k.src = r; a.parentNode.insertBefore(k, a);
      })(window, document, 'script', 'https://mc.yandex.ru/metrika/tag.js', 'ym');
      if (window.__YM_ID__) {
        window.ym(window.__YM_ID__, 'init', {
          clickmap: true,
          trackLinks: true,
          accurateTrackBounce: true,
          webvisor: true,
        });
      }
    </script>
    <!-- ==================================================== -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
